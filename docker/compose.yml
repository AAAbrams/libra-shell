services:
  app:
    build:
      context: ..
      dockerfile: docker/php/Dockerfile
    container_name: libra-shell-app
    working_dir: /var/www/html
    volumes:
      - ..:/var/www/html
    environment:
      APP_ENV: "prod"
      VITE_DEV_MODE: "false"
      VITE_OUT_DIR: "public/build"
      VITE_SSR_OUT_DIR: "bootstrap/ssr"
      VITE_PUBLIC_BASE: "/build"
      INERTIA_SSR_ENABLED: "true"
      INERTIA_SSR_URL: "http://ssr:13714/render"
      INERTIA_SSR_TIMEOUT: "2"
    depends_on:
      ssr:
        condition: service_healthy
    ports:
      - "8080:80"

  ssr:
    build:
      context: ..
      dockerfile: docker/node/Dockerfile
    container_name: libra-shell-ssr
    working_dir: /var/www/html
    volumes:
      - ..:/var/www/html
      - node_modules:/var/www/html/node_modules
    environment:
      APP_ENV: "prod"
      VITE_DEV_MODE: "false"
      VITE_OUT_DIR: "public/build"
      VITE_SSR_OUT_DIR: "bootstrap/ssr"
      VITE_PUBLIC_BASE: "/build"
      VITE_SSR_PORT: "13714"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const net=require('net');const socket=net.createConnection(13714,'127.0.0.1');socket.on('connect',()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),1000);"
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    ports:
      - "13714:13714"

volumes:
  node_modules:
